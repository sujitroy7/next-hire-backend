version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: next_hire_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  redis:
    image: redis:7
    container_name: next_hire_redis
    ports:
      - "6379:6379"

  api:
    build: ./apis
    container_name: next_hire_api
    command: pnpm dev
    volumes:
      - ./apis:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  client:
    build: ./client
    container_name: next_hire_client
    command: pnpm dev
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
